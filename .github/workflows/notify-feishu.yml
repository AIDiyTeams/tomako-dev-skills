# 仓库事件飞书通知（对齐 https://github.com/Lirzh/action-feishu ）
# Issue 结构化字段与 .github/ISSUE_TEMPLATE/feature_request.yml 对齐

name: Notify Feishu on Events

on:
  issues:
    types: [opened, closed, reopened]
  discussion:
    types: [created, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  pull_request_review:
    types: [submitted]
  push:
    branches: [main]
  release:
    types: [published, deleted]

jobs:
  notify-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          # Issues
          ISSUE_URL: ${{ github.event.issue.html_url || 'N/A' }}
          ISSUE_TITLE: ${{ github.event.issue.title || 'N/A' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          # PR / Review
          PR_URL: ${{ github.event.pull_request.html_url || 'N/A' }}
          PR_TITLE: ${{ github.event.pull_request.title || 'N/A' }}
          PR_BASE: ${{ github.event.pull_request.base.ref || 'N/A' }}
          PR_HEAD: ${{ github.event.pull_request.head.ref || 'N/A' }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_STATE: ${{ github.event.pull_request.state || 'N/A' }}
          REVIEW_STATE: ${{ github.event.review.state || 'N/A' }}
          REVIEW_BODY: ${{ github.event.review.body || '' }}
          # Discussion
          DISCUSSION_URL: ${{ github.event.discussion.html_url || 'N/A' }}
          DISCUSSION_TITLE: ${{ github.event.discussion.title || '未命名' }}
          DISCUSSION_CATEGORY: ${{ github.event.discussion.category.name || '未分类' }}
          # Push
          PUSH_BRANCH: ${{ github.ref_name }}
          PUSH_COMMIT_SHA: ${{ github.sha }}
          PUSH_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          PUSH_COMPARE_URL: ${{ github.event.compare || 'N/A' }}
          # Release
          RELEASE_TAG: ${{ github.event.release.tag_name || 'N/A' }}
          RELEASE_NAME: ${{ github.event.release.name || '未命名' }}
          RELEASE_URL: ${{ github.event.release.html_url || 'N/A' }}
          MESSAGE_TITLE: ${{ secrets.FEISHU_MESSAGE_TITLE || '【GitHub 事件通知】' }}
        run: |
          set -euo pipefail

          if [ -z "${FEISHU_WEBHOOK_URL:-}" ]; then
            echo "FEISHU_WEBHOOK_URL secret 未配置，跳过通知"
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && [ -z "${{ github.event.head_commit }}" ]; then
            echo "无 head_commit，跳过 push 通知"
            exit 0
          fi

          NEWLINE=$'\n'
          EVENT_URL="N/A"
          DETAIL_CONTENT=""
          EVENT_ACTION_DISPLAY="${EVENT_ACTION:-推送代码}"

          if [ "$EVENT_NAME" = "issues" ]; then
            EVENT_URL=$ISSUE_URL
            LABELS="${ISSUE_LABELS:-无}"
            DETAIL_CONTENT="标题：$ISSUE_TITLE${NEWLINE}标签：$LABELS"

            CATEGORY=$(echo "$ISSUE_BODY" | awk '/### 功能类别/{f=1;next} /### /{f=0} f' | sed '/^$/d' | tr -d '\r' | head -10)
            CATEGORY="${CATEGORY:-未填写}"
            SUMMARY=$(echo "$ISSUE_BODY" | awk '/### 功能概述/{f=1;next} /### /{f=0} f' | sed '/^$/d' | tr -d '\r' | head -10)
            SUMMARY="${SUMMARY:-未填写}"
            PRIORITY=$(echo "$ISSUE_BODY" | awk '/### 优先级/{f=1;next} /### /{f=0} f' | sed '/^$/d' | tr -d '\r' | head -10)
            PRIORITY="${PRIORITY:-未填写}"

            DETAIL_CONTENT="${DETAIL_CONTENT}${NEWLINE}🔹 功能类别：$CATEGORY${NEWLINE}🔹 功能概述：$SUMMARY${NEWLINE}🔹 优先级：$PRIORITY"

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            EVENT_URL=$PR_URL
            MERGE_NOTE=""
            if [ "$EVENT_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
              MERGE_NOTE="${NEWLINE}结果：已合并到 ${PR_BASE}"
            elif [ "$EVENT_ACTION" = "closed" ]; then
              MERGE_NOTE="${NEWLINE}结果：已关闭未合并"
            fi
            DETAIL_CONTENT="标题：$PR_TITLE${NEWLINE}分支：${PR_HEAD} → ${PR_BASE}${MERGE_NOTE}"

          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            EVENT_URL=$PR_URL
            REVIEW_LABEL=$REVIEW_STATE
            case "$REVIEW_STATE" in
              approved) REVIEW_LABEL="✅ 已通过" ;;
              changes_requested) REVIEW_LABEL="🔄 需修改" ;;
              commented) REVIEW_LABEL="💬 仅评论" ;;
            esac
            TRUNCATED_REVIEW=$(printf '%s' "$REVIEW_BODY" | head -n3 | cut -c1-200)
            DETAIL_CONTENT="PR：$PR_TITLE${NEWLINE}评审：$REVIEW_LABEL"
            if [ -n "$TRUNCATED_REVIEW" ]; then
              DETAIL_CONTENT="${DETAIL_CONTENT}${NEWLINE}摘要：$TRUNCATED_REVIEW"
            fi

          elif [ "$EVENT_NAME" = "discussion" ]; then
            EVENT_URL=$DISCUSSION_URL
            DETAIL_CONTENT="标题：$DISCUSSION_TITLE${NEWLINE}分类：$DISCUSSION_CATEGORY"

          elif [ "$EVENT_NAME" = "push" ]; then
            EVENT_URL=$PUSH_COMPARE_URL
            SHORT_SHA=${PUSH_COMMIT_SHA:0:7}
            TRUNCATED_MSG=$(printf '%s' "$PUSH_COMMIT_MESSAGE" | head -n1 | cut -c1-200)
            DETAIL_CONTENT="分支：$PUSH_BRANCH${NEWLINE}提交：$SHORT_SHA${NEWLINE}说明：$TRUNCATED_MSG"

          elif [ "$EVENT_NAME" = "release" ]; then
            EVENT_URL=$RELEASE_URL
            ACTION_LABEL="${EVENT_ACTION}"
            case "$EVENT_ACTION" in
              published) ACTION_LABEL="已发布" ;;
              deleted) ACTION_LABEL="已删除" ;;
            esac
            EVENT_ACTION_DISPLAY="$ACTION_LABEL"
            DETAIL_CONTENT="标签：$RELEASE_TAG${NEWLINE}名称：$RELEASE_NAME"
          fi

          MESSAGE_CONTENT="${MESSAGE_TITLE}${NEWLINE}仓库：$REPOSITORY${NEWLINE}事件：$EVENT_NAME${NEWLINE}操作：$EVENT_ACTION_DISPLAY${NEWLINE}触发人：$ACTOR${NEWLINE}链接：$EVENT_URL"
          if [ -n "$DETAIL_CONTENT" ]; then
            MESSAGE_CONTENT="$MESSAGE_CONTENT${NEWLINE}$DETAIL_CONTENT"
          fi

          ESCAPED_CONTENT=$(printf '%s' "$MESSAGE_CONTENT" | sed 's/\\/\\\\/g; s/"/\\"/g' | tr '\n' '|')
          ESCAPED_CONTENT=${ESCAPED_CONTENT//|/\\n}
          PAYLOAD="{\"msg_type\":\"text\",\"content\":{\"text\":\"${ESCAPED_CONTENT}\"}}"

          if [ -n "${FEISHU_WEBHOOK_SECRET:-}" ]; then
            TIMESTAMP="$(date +%s)"
            SIGN="$(printf '%s\n%s' "$TIMESTAMP" "$FEISHU_WEBHOOK_SECRET" \
              | openssl dgst -sha256 -hmac "" -binary \
              | base64)"
            PAYLOAD="{\"timestamp\":\"${TIMESTAMP}\",\"sign\":\"${SIGN}\",\"msg_type\":\"text\",\"content\":{\"text\":\"${ESCAPED_CONTENT}\"}}"
          fi

          HTTP_CODE=$(curl -sS -o /tmp/feishu-response.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$FEISHU_WEBHOOK_URL")

          echo "飞书响应 (HTTP ${HTTP_CODE}):"
          cat /tmp/feishu-response.txt
          echo

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            if grep -Eq '"code"[[:space:]]*:[[:space:]]*0|"StatusCode"[[:space:]]*:[[:space:]]*0' /tmp/feishu-response.txt; then
              echo "飞书通知已发送"
            else
              echo "飞书通知接口返回非成功业务状态"
              exit 1
            fi
          else
            echo "飞书通知失败 (HTTP ${HTTP_CODE})"
            exit 1
          fi
        shell: bash
